name: Build Alpine Hybrid ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Instalar Dependencias del Sistema
        run: |
          sudo apt-get update
          # Dependencias para Fyne (GUI en Go) y herramientas de Boot (ISO)
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev xorriso grub-pc-bin grub-efi-amd64-bin mtools dosfstools wget

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Descargar Módulos Go
        run: go mod tidy

      - name: Compilar Interfaz Fyne (Kiosk) para Linux
        run: |
          mkdir -p bin
          # Compilar el binario con CGO para Linux X11/Wayland
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o bin/conversor_gui ./cmd/interfaz/main.go

      - name: Generar ISO de Alpine Linux
        run: |
          chmod +x scripts/construir_iso_hibrida.sh
          # Ejecutar el script que empaqueta todo
          ./scripts/construir_iso_hibrida.sh

      - name: Subir ISO a Resultados (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Conversor-Basico-Dinamico-ISO
          path: Conversor_Disco_UEFI_Legacy.iso
          if-no-files-found: error
